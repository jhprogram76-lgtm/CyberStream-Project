<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStream | Acceso SOC</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1280');
            background-size: cover;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .login-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
            border-top: 4px solid #E50914;
            z-index: 10;
        }
        .logo { color: #E50914; font-size: 30px; margin-bottom: 20px; font-weight: bold; }
        .logo span { color: white; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #E50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg { color: #E87C03; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">CYBER<span>STREAM</span></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required autocomplete="off">
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="login-btn">Acceder al SOC</button>
            <p id="errorMessage" class="error-msg"></p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorDisplay = document.getElementById('errorMessage');

            if (pass.length < 8) {
                errorDisplay.innerText = "⚠️ Seguridad: Mínimo 8 caracteres.";
                errorDisplay.style.display = 'block';
                return;
            }

            if (email === "admin@cyberstream.com" && pass === "CyberAudit2024!") {
                alert("Acceso concedido. Cargando Dashboard...");
            } else {
                errorDisplay.innerText = "❌ Credenciales no autorizadas.";
                errorDisplay.style.display = 'block';
            }
        });
    </script>
</body>
</html>
